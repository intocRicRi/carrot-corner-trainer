<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrot Corner Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="brand">
      <div class="brand__logo" aria-hidden="true">
        <svg viewBox="0 0 64 64" width="34" height="34">
          <g transform="rotate(8 32 32)">
            <path d="M22 26 L42 26 L33 60 Q32 63 31 60 Z" fill="#F47C20"/>
            <path d="M22 26 L42 26 L39 36 L25 36 Z" fill="#E2680F"/>
            <path d="M32 26 C30 16 22 14 18 16 C24 18 26 22 26 26 Z" fill="#3FA34D"/>
            <path d="M32 26 C34 14 42 12 47 15 C40 16 37 21 36 26 Z" fill="#4CAF50"/>
          </g>
        </svg>
      </div>
      <div class="brand__text">
        <span class="brand__name">CARROT CORNER</span>
        <span class="brand__tag">NLHE 6-max Cash · Trainer</span>
      </div>
      <div class="brand__right">
        <span class="deck-count" id="deckCount" title="Hands in this deck">0 hands</span>
        <a class="admin-link" href="admin.html">Admin →</a>
      </div>
    </header>

    <!-- Empty-deck state -->
    <div class="empty" id="empty" hidden>
      <h2>No hands yet</h2>
      <p>Head to the <a href="admin.html">Admin page</a> to generate and grade your first spot.</p>
    </div>

    <main class="layout" id="layout">
      <!-- The visual "spot" -->
      <section class="spot" aria-label="Poker spot">
        <div class="table" id="table"></div>
        <div class="spot__caption" id="caption"></div>
        <div class="suitkey" aria-label="Four-colour deck key">
          <span><i class="suit-s">♠</i> Spades</span>
          <span><i class="suit-h">♥</i> Hearts</span>
          <span><i class="suit-d">♦</i> Diamonds</span>
          <span><i class="suit-c">♣</i> Clubs</span>
        </div>
      </section>

      <!-- The quiz -->
      <section class="quiz">
        <div class="quiz__head">
          <h1 class="quiz__title" id="title"></h1>
          <span class="quiz__progress" id="progress"></span>
        </div>
        <p class="quiz__stakes" id="stakes"></p>

        <div class="action" id="description"></div>

        <p class="question" id="question"></p>

        <div class="options" id="options"></div>

        <div class="legend" id="legend" hidden>
          <span class="legend__item"><i class="dot s-best"></i>Best</span>
          <span class="legend__item"><i class="dot s-good"></i>Good</span>
          <span class="legend__item"><i class="dot s-okay"></i>OK</span>
          <span class="legend__item"><i class="dot s-mistake"></i>Mistake</span>
          <span class="legend__item"><i class="dot s-horrible"></i>Blunder</span>
          <span class="legend__item"><i class="gto-chip">GTO&nbsp;✅</i>In theory</span>
        </div>

        <div class="feedback" id="feedback" hidden>
          <div class="feedback__author">
            <span class="feedback__avatar">PC</span>
            <span class="feedback__name" id="author"></span>
            <span class="feedback__role">Coach feedback</span>
          </div>
          <p class="feedback__text" id="feedbackText"></p>
          <div class="feedback__actions">
            <button class="btn-ghost" id="retry">Try again</button>
            <button class="btn-primary" id="next">Next hand →</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="table.js"></script>
  <script src="app.js"></script>
</body>
</html>
