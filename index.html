<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrot Corner Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="midnight">
  <div class="tapp">
    <header class="tbanner">
      <div class="tbanner__brand">
        <span class="tbanner__logo" aria-hidden="true">
          <svg viewBox="0 0 64 64" width="26" height="26">
            <g transform="rotate(8 32 32)">
              <path d="M22 26 L42 26 L33 60 Q32 63 31 60 Z" fill="#F47C20"/>
              <path d="M22 26 L42 26 L39 36 L25 36 Z" fill="#E2680F"/>
              <path d="M32 26 C30 16 22 14 18 16 C24 18 26 22 26 26 Z" fill="#3FA34D"/>
              <path d="M32 26 C34 14 42 12 47 15 C40 16 37 21 36 26 Z" fill="#4CAF50"/>
            </g>
          </svg>
        </span>
        <button class="tbanner__theme" id="themeBtn">
          <span id="themeName">Turn Probe Opportunity</span>
          <span class="tbanner__meta" id="themeMeta"></span>
          <span class="tbanner__chev">▾</span>
        </button>
        <div class="tbanner__menu" id="themeMenu" hidden></div>
      </div>
      <div class="tbanner__nav">
        <a class="tbanner__admin" href="admin.html">Admin</a>
        <button class="tnavbtn" id="prevBtn" aria-label="Previous hand">◀</button>
        <span class="tcount" id="handCount">—</span>
        <button class="tnavbtn" id="nextBtn" aria-label="Next hand">▶</button>
        <button class="tshuffle" id="randomBtn">⤳ Random</button>
      </div>
    </header>

    <div class="tempty" id="empty" hidden>
      <h2>No hands yet</h2>
      <p>Head to the <a href="admin.html">Admin page</a> to add the first spot.</p>
    </div>

    <main class="tmain" id="layout">
      <div class="tgrid">
        <div class="table" id="table"></div>
        <div class="tside">
          <div class="trecap" id="recap"></div>
          <div class="tanswers" id="answers"></div>
          <div class="tlegend" id="legend"></div>
          <div class="tcoach" id="coach"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="table.js"></script>
  <script src="app.js"></script>
</body>
</html>
